# Docker Compose for IEEE Report Restructurer
# Full-stack deployment configuration

version: '3.8'

services:
  # Main application service (Backend + Frontend)
  ieee-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ieee-report-restructurer
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.1-8b-instant}
      - PYTHONUNBUFFERED=1
    volumes:
      # Persist uploads and outputs
      - ./data/uploads:/app/uploads
      - ./data/outputs:/app/outputs
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ieee-network

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: ieee-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - ieee-app
    restart: unless-stopped
    networks:
      - ieee-network
    profiles:
      - production

networks:
  ieee-network:
    driver: bridge

volumes:
  uploads:
  outputs:
